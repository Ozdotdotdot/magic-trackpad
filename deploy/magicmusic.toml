# Magic Music configuration. Installed to /etc/magicmusic.toml
#
# Every key is optional; anything you omit uses the built-in default shown here.
# Edit and then `sudo systemctl restart magicmusic` to apply.

# --- play/pause (force-click: 1-finger = mpc, 3-finger = playerctl) ---
force_click = 180          # pressure to trigger play/pause (0-253); higher = press harder
pressure_rearm = 120       # pressure must drop below this before it can fire again; also
                           # where the up-click fires as your finger lifts

# --- volume (3-finger vertical slide) ---
step_distance = 90         # trackpad units between volume notches; higher = slower/coarser
vol_delta_pct = 2          # volume percent changed per notch
volume_deadzone = 200      # travel ignored before a slide acts (also the axis-lock gate)

# --- track skip (3-finger horizontal slide) ---
skips_across_pad = 3       # full-width swipe = this many skips; lower = longer swipe per skip

# --- timing ---
ready_debounce = 0.04      # seconds 3 fingers must persist before the "ready" buzz
                           # (filters the 3-finger transient of a 4-finger workspace swipe)

# --- lights (5-finger double-tap toggles a Home Assistant webhook) ---
lights_url = "http://100.122.255.109:8123/api/webhook/togglelights"
tap_max_duration = 0.3     # a 5-finger touch shorter than this counts as a tap
double_tap_gap = 0.5       # max seconds between the two taps

# --- audio sink targeted by wpctl ---
sink = "@DEFAULT_AUDIO_SINK@"

# --- haptic strengths (0x00-0x7f), byte 3 of the actuator report ---
ready_buzz = 0x2a          # 3 fingers landed -> gesture mode ready
tick_buzz  = 0x12          # light per-volume-step tick
skip_buzz  = 0x35          # firmer buzz per track skip
tap_buzz   = 0x3f          # force-click down-click (firm play/pause confirm)

# up-click fired as a force-press lifts, for a real two-actuation click feel.
# Mirrors the firmware's button_up waveform; differs from the down-click in
# texture (b6/b11), not just strength. Tune all three with haptic_tune.py.
release_buzz = 0x11        # up-click strength (b3)
release_b6   = 0x04        # up-click texture (b6)
release_b11  = 0x04        # up-click texture (b11)
