# Magic Music: installed to /etc/modprobe.d/magic-music.conf
#
# Use the nexustar hid-magicmouse fork (host-click mode + custom haptics) instead
# of the in-kernel driver, and load it with host_click enabled so the trackpad's
# actuator is host-driven (required for the userspace haptic feedback).
#
# Blacklisting the stock module lets the modalias autoloader pick the fork when
# the trackpad connects; the options line applies whenever the fork loads.

blacklist hid_magicmouse
options hid-magicmouse-nexustar host_click=on button_down_param=0x40170606 button_up_param=0x26140000
